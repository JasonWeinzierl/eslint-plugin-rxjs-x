name: publish

on:
  workflow_dispatch: {}
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  check-main:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'release' && !startsWith(github.event.release.tag_name, 'v0.9.'))
      }}
    uses: ./.github/workflows/ci.yml

  check-0-9:
    if: ${{ github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v0.9.') }}
    uses: JasonWeinzierl/eslint-plugin-rxjs-x/.github/workflows/ci.yml@0.9.x

  publish-main:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'release' && !startsWith(github.event.release.tag_name, 'v0.9.'))
      }}
    needs: check-main

    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # Required for OIDC

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          check-latest: true
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Setup Yarn
        run: corepack enable

      - name: Install Packages
        run: yarn install

      - name: Build
        run: yarn build

      - name: Trusted Publish with Provenance
        run: npm publish

  publish-0-9:
    if: ${{ github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v0.9.') }}
    needs: check-0-9

    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # Required for OIDC

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          check-latest: true
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Setup Yarn
        run: corepack enable

      - name: Install Packages
        run: yarn install

      - name: Build
        run: yarn build

      - name: Trusted Publish with Provenance (legacy tag)
        run: npm publish --tag legacy
